<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <!-- Leaflet -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet Draw -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    #map {
      height: 500px;
      margin-bottom: 20px;
    }

    input, textarea {
      display:block;
      margin:5px 0;
      width:300px;
    }

    table {
      border-collapse: collapse;
      margin-top:20px;
    }

    td, th {
      border:1px solid #ccc;
      padding:8px;
    }
  </style>
</head>
<body>

<h1>🌿 Admin Dashboard</h1>

<h3>Ajouter / Modifier une forêt</h3>

<input id="name" placeholder="Nom">
<input id="region" placeholder="Région">
<textarea id="history" placeholder="Histoire"></textarea>
<textarea id="species" placeholder="Espèces"></textarea>
<textarea id="recommendation" placeholder="Recommandation"></textarea>

<button onclick="saveForest()">💾 Enregistrer</button>

<h3>Dessiner la forêt</h3>

<div id="map" style="height:500px; margin-bottom:20px;"></div>

<hr>

<h3>Liste des forêts</h3>

<table id="forestTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Région</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="map"></div>
<script src="js/admin.js"></script>

</body>
</html>
